services:
  compliance-assistant:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/app/chroma_data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  chroma_data:
